<script>
$(document).ready(function() {
  let carrinho = JSON.parse(localStorage.getItem('carrinho')) || [];
  let pixGerado = false;

  // Cart Toggle
  $('#cartToggle, #closeCart, #cartOverlay').on('click', function() {
    $('#carrinho').toggleClass('translate-x-full');
    $('#cartOverlay').toggleClass('hidden');
  });

  function atualizarCheckout() {
    let html = '';
    let total = 0;
    $.each(carrinho, function(index, item) {
      html += `<div class="flex justify-between py-3 border-b border-gray-200 items-center">
        <div>
          <p class="font-medium">${item.nome}</p>
          <p class="text-sm text-gray-500">${item.preco}</p>
        </div>
        <div class="flex items-center gap-2">
          <span class="font-semibold text-lg">${item.preco}</span>
          <button type="button" class="text-red-500 hover:text-red-700 text-xl font-bold" onclick="removerDoCarrinho(${index})">&times;</button>
        </div>
      </div>`;
      total += parseFloat(item.preco.replace('R$ ', '').replace('.', '').replace(',', '.'));
    });
    $('#produtos').html(html);
    $('#total').text(`Total: R$ ${total.toFixed(2).replace('.', ',')}`);
    $('#cartCount').text(carrinho.length);
  }

  window.removerDoCarrinho = function(index) {
    carrinho.splice(index, 1);
    localStorage.setItem('carrinho', JSON.stringify(carrinho));
    atualizarCheckout();
    atualizarMiniCarrinho();
  };

  function atualizarMiniCarrinho() {
    let html = '';
    let total = 0;
    if (carrinho.length === 0) {
      html = '<p class="text-gray-500 text-center py-8">Vazio</p>';
    } else {
      $.each(carrinho, function(index, item) {
        html += `<div class="flex justify-between py-2 border-b border-gray-200">
          <span class="text-sm">${item.nome}</span>
          <span class="text-sm font-medium">${item.preco} <button type="button" class="text-red-500 ml-2" onclick="removerDoCarrinho(${index})">&times;</button></span>
        </div>`;
        total += parseFloat(item.preco.replace('R$ ', '').replace('.', '').replace(',', '.'));
      });
      html += `<div class="mt-4 pt-4 border-t border-gray-200">
        <p class="font-semibold">Total: R$ ${total.toFixed(2).replace('.', ',')}</p>
      </div>`;
    }
    $('#cartContent').html(html);
  }

  atualizarCheckout();
  atualizarMiniCarrinho();

  // Masks
  $('#inputValidade').on('input', function() {
    let val = $(this).val().replace(/\D/g, '');
    if (val.length > 4) val = val.slice(0, 4);
    if (val.length > 2) val = val.slice(0, 2) + '/' + val.slice(2);
    $(this).val(val);
    atualizarCartaoVisual();
  });

  $('#inputNumero').on('input', function() {
    let val = $(this).val().replace(/\D/g, '');
    if (val.length > 16) val = val.slice(0, 16);
    $(this).val(val.replace(/(.{4})/g, '$1 ').trim());
    atualizarCartaoVisual();
  });

  // Card Visual
  function detectarBandeira(numero) {
    numero = numero.replace(/\D/g, '');
    if (numero.startsWith('4')) return 'visa';
    if (/^(5[1-5]|222[1-9]|22[3-9]|2[3-6]|27[01]|2720)/.test(numero)) return 'mastercard';
    if (numero.startsWith('3')) return 'amex';
    if (/^(50|6[0-9]{4})/.test(numero)) return 'elo';
    return '';
  }

  function atualizarCartaoVisual() {
    const numero = $('#inputNumero').val() || '**** **** **** ****';
    const nome = $('#inputNome').val() || 'Nome no cartão';
    const validade = $('#inputValidade').val() || 'MM/AA';
    const cvv = $('#inputCVV').val() || '***';
    const bandeira = detectarBandeira(numero);
    $('#cartaoVisual .front .numero').text(numero);
    $('#cartaoVisual .front .nome').text(nome);
    $('#cartaoVisual .front .validade').text(validade);
    $('#cvvVisual').text(cvv);
    let bandeiraSrc = '';
    switch (bandeira) {
      case 'visa': bandeiraSrc = 'img/visa.png'; break;
      case 'mastercard': bandeiraSrc = 'img/mastercard.png'; break;
      case 'amex': bandeiraSrc = 'img/amex.png'; break;
      case 'elo': bandeiraSrc = 'img/elo.png'; break;
    }
    $('#imgBandeira').attr('src', bandeiraSrc);
    const innerCartao = $('#cartaoVisual .inner');
    if ($('#inputCVV').is(':focus')) {
      innerCartao.css('transform', 'rotateY(180deg)');
    } else {
      innerCartao.css('transform', 'rotateY(0deg');
    }
  }

  $('#inputNumero, #inputNome, #inputValidade, #inputCVV').on('input', atualizarCartaoVisual);
  $('#inputCVV').on('focus blur', atualizarCartaoVisual);

  // Payment Change
  $('#formaPagamento').on('change', function() {
    pixGerado = false;
    $('#paymentForm').removeClass('hidden');
    $('#paymentResult').addClass('hidden').html('');
    const value = $(this).val();
    if (value === 'pix') { 
      $('#cartaoCampos').addClass('hidden'); 
      $('#submitBtn').text('Gerar PIX');
    } else if (value === 'boleto') { 
      $('#cartaoCampos').addClass('hidden'); 
      $('#paymentResult').html('<p class="text-blue-500 font-bold my-1">Clique em "Finalizar Compra" para gerar o boleto bancário.</p>'); 
      $('#paymentResult').removeClass('hidden');
      $('#submitBtn').text('Gerar Boleto');
    } else if (value === 'cartao') { 
      $('#cartaoCampos').removeClass('hidden'); 
      $('#submitBtn').text('Pagar com Cartão');
    } else { 
      $('#cartaoCampos').addClass('hidden'); 
      $('#submitBtn').text('Finalizar Compra');
    }
  });

  // PIX Generation
  async function gerarPix() {
    const formData = new FormData($('#checkoutForm')[0]);
    let total = carrinho.reduce((sum, item) => sum + parseFloat(item.preco.replace('R$ ', '').replace('.', '').replace(',', '.')), 0);
    if (total === 0) {
      total = 50; // Default for testing
      console.log('Using default total for testing');
    }
    const pedido = {
      total,
      formaPagamento: 'pix',
      nome: formData.get('nome') || 'Cliente Teste',
      email: formData.get('email') || 'teste@email.com',
      cpf: formData.get('cpf') || '123.456.789-00'
    };
    try {
      console.log('Enviando pedido para Netlify function:', pedido);
      const res = await fetch('/.netlify/functions/criarTransacao', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(pedido)
      });
      console.log('Resposta do servidor:', res.status, res.statusText);
      const data = await res.json();
      console.log('Dados recebidos:', data);
      if (data.ok && data.qr_code) {
        pixGerado = true;
        $('#paymentForm').addClass('hidden');
        $('#paymentResult').removeClass('hidden').html(`
          <div class="bg-gradient-to-br from-blue-50 to-indigo-50 p-6 rounded-xl mt-6 border border-blue-100">
            <p class="text-blue-600 font-semibold mb-3 text-lg">Pague via PIX instantaneamente!</p>
            <img src="data:image/png;base64,${data.qrcodeBase64}" alt="QR Code PIX" class="mx-auto w-48 h-48 border-2 border-gray-300 rounded-xl shadow-md mb-4">
            <textarea id="pixKey" readonly class="w-full h-16 mb-3 font-mono text-sm bg-white border border-gray-300 rounded-lg p-2 resize-none">${data.qr_code}</textarea>
            <button type="button" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-4 rounded-lg transition-colors" onclick="copiarPix()">Copiar Código PIX</button>
            <p class="mt-4 text-xs text-gray-500 text-center">ID da Transação: <span class="font-mono">${data.transacaoId}</span> | Expira em 30 minutos</p>
          </div>
        `);
        $('#submitBtn').html('<i class="mr-2">✓</i>Confirmar Pagamento PIX');
        $('#submitBtn').off('click').on('click', function(e) { 
          e.preventDefault(); 
          $('#checkoutForm')[0].submit(); 
        });
      } else {
        $('#paymentResult').removeClass('hidden').html(`<p class="text-red-500 font-semibold">Erro ao gerar PIX: ${data.erro || 'Tente novamente'}</p>`);
      }
    } catch (err) { 
      console.error('Erro na fetch:', err);
      $('#paymentResult').removeClass('hidden').html(`<p class="text-red-500 font-semibold">Erro de conexão: ${err.message}. Verifique sua internet e tente novamente.</p>`); 
    }
  }

  async function gerarCartao() {
    const formData = new FormData($('#checkoutForm')[0]);
    let total = carrinho.reduce((sum, item) => sum + parseFloat(item.preco.replace('R$ ', '').replace('.', '').replace(',', '.')), 0);
    if (total === 0) {
      total = 50; // Default for testing
      console.log('Using default total for testing');
    }
    const card = {
      number: $('#inputNumero').val().replace(/\s/g, ''),
      holderName: $('#inputNome').val(),
      expMonth: parseInt($('#inputValidade').val().split('/')[0]),
      expYear: parseInt('20' + $('#inputValidade').val().split('/')[1]),
      cvv: $('#inputCVV').val()
    };
    try {
      const token = await TitansHub.encrypt(card);
      const pedido = {
        token,
        total,
        formaPagamento: 'cartao',
        nome: formData.get('nome') || 'Cliente Teste',
        email: formData.get('email') || 'teste@email.com',
        cpf: formData.get('cpf') || '123.456.789-00'
      };
      console.log('Enviando pedido para cartão:', pedido);
      const resposta = await fetch('/.netlify/functions/criartransacao', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(pedido)
      });
      console.log('Resposta do servidor:', resposta.status, resposta.statusText);
      const data = await resposta.json();
      console.log('Dados recebidos:', data);
      if (data.ok) {
        $('#paymentForm').addClass('hidden');
        alert('✅ Pagamento aprovado com sucesso!');
        $('#checkoutForm')[0].submit();
      } else {
        $('#paymentResult').removeClass('hidden').html(`<p class="text-red-500 font-semibold">Pagamento recusado: ${data.erro || 'Verifique os dados do cartão e tente novamente.'}</p>`);
      }
    } catch (err) { 
      console.error('Erro na fetch:', err);
      $('#paymentResult').removeClass('hidden').html(`<p class="text-red-500 font-semibold">Erro ao processar o pagamento: ${err.message}. Tente novamente.</p>`); 
    }
  }

  window.copiarPix = function() {
    const textarea = $('#pixKey')[0];
    if (textarea) {
      textarea.select();
      textarea.setSelectionRange(0, 99999);
      document.execCommand('copy');
      const btn = event.target;
      const originalText = btn.innerHTML;
      btn.innerHTML = '<i class="mr-2">✓</i>Copiado!';
      $(btn).removeClass('bg-indigo-600 hover:bg-indigo-700').addClass('bg-green-500');
      setTimeout(() => {
        btn.innerHTML = originalText;
        $(btn).removeClass('bg-green-500').addClass('bg-indigo-600 hover:bg-indigo-700');
      }, 2000);
    }
  };

  // Button Click
  $('#submitBtn').on('click', async function(e) {
    e.preventDefault();

    const forma = $('#formaPagamento').val();
    let total = carrinho.reduce((sum, item) => sum + parseFloat(item.preco.replace('R$ ', '').replace('.', '').replace(',', '.')), 0);
    if (total === 0) {
      total = 50; // Default for testing
      console.log('Using default total for testing');
    }

    if (total === 0) {
      alert('Adicione itens ao carrinho para prosseguir.');
      return;
    }

    if (forma === 'pix') { 
      await gerarPix(); 
    } else if (forma === 'boleto') { 
      $('#paymentResult').removeClass('hidden').html('<p class="text-blue-500 font-bold">Gerando boleto... (Implementar lógica aqui)</p>'); 
      // Add boleto logic if needed
    } else if (forma === 'cartao') { 
      await gerarCartao(); 
    } else {
      // Default action, perhaps submit the form
      $('#checkoutForm')[0].submit();
    }
  });
});

// ViaCEP
$('#cep').on('blur', function() {
  const cep = $(this).val().replace(/\D/g, '');
  if (cep.length === 8) {
    fetch(`https://viacep.com.br/ws/${cep}/json/`)
      .then(res => res.json())
      .then(data => {
        if (!data.erro) {
          $('#rua').val(data.logradouro || '');
          $('#bairro').val(data.bairro || '');
          $('#cidade').val(data.localidade || '');
          $('#estado').val(data.uf || '');
        } else {
          alert('CEP não encontrado! Verifique e tente novamente.');
        }
      }).catch(() => alert('Erro ao consultar CEP. Tente novamente.'));
  }
});
</script>
